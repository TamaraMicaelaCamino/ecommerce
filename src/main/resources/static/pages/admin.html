<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Talento Tech Ecommerce</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
    <link rel="stylesheet" href="../styles.css">
</head>

<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <a href="../index.html">
            <img src="../img/logo1.png" class="logo" alt="Logo Talento Tech" width="40px" height="40px">
        </a>
        <div>
            <ul id="navbar" class="navbar">
                <li><a href="../index.html">Home</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <a href="#" id="close" class="close">
                    <i class="far fa-times" aria-hidden="true"></i>
                </a>
            </ul>
        </div>
        <div class="mobile">
            <i id="bar" class="fas fa-outdent"></i>
        </div>
    </header>

    <main style="padding: 40px; max-width: 900px; margin: auto;">

        <h1 style="margin-bottom: 30px;">Panel de Administración</h1>

        <!-- ==================== CREAR CATEGORIA ==================== -->
        <section style="background:#f5f5f5; padding:20px; border-radius:8px; margin-bottom:30px;">
            <h2>Crear Categoría</h2>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
                <input type="text" id="nombreCategoria" placeholder="Nombre de la categoría"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <input type="text" id="descripcionCategoria" placeholder="Descripción"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <button onclick="crearCategoria()"
                        style="padding:10px; background:#088178; color:white; border:none; border-radius:5px; cursor:pointer;">
                    Crear Categoría
                </button>
                <p id="mensajeCategoria" style="min-height:18px;"></p>
            </div>
        </section>

        <!-- ==================== CREAR PRODUCTO ==================== -->
        <section style="background:#f5f5f5; padding:20px; border-radius:8px; margin-bottom:30px;">
            <h2>Crear Producto</h2>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
                <input type="text" id="nombreProducto" placeholder="Nombre del producto"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <input type="text" id="descripcionProducto" placeholder="Descripción"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <input type="text" id="precioProducto" placeholder="Precio (ej: 50.000 o 50,5)"
                       inputmode="decimal"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <input type="number" id="stockProducto" placeholder="Stock" min="0"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <input type="text" id="imagenProducto" placeholder="URL de imagen"
                       style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <select id="categoriaProducto"
                        style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                    <option value="">Seleccioná una categoría</option>
                </select>
                <button onclick="crearProducto()"
                        style="padding:10px; background:#088178; color:white; border:none; border-radius:5px; cursor:pointer;">
                    Crear Producto
                </button>
                <p id="mensajeProducto" style="min-height:18px;"></p>
            </div>
        </section>

        <!-- ==================== LISTA PRODUCTOS ==================== -->
        <section style="background:#f5f5f5; padding:20px; border-radius:8px;">
            <h2>Productos cargados</h2>
            <table width="100%" style="margin-top:15px; border-collapse:collapse;">
                <thead>
                    <tr style="background:#088178; color:white;">
                        <td style="padding:10px;">ID</td>
                        <td style="padding:10px;">Nombre</td>
                        <td style="padding:10px;">Descripción</td>
                        <td style="padding:10px;">Precio</td>
                        <td style="padding:10px;">Stock</td>
                        <td style="padding:10px;">Acciones</td>
                    </tr>
                </thead>
                <tbody id="tablaProductos"></tbody>
            </table>
        </section>

    </main>

    <!-- ==================== MODAL EDITAR PRODUCTO ==================== -->
    <div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:8px; width:400px; max-width:90%;">
            <h2 style="margin-bottom:20px;">Editar Producto</h2>
            <input type="hidden" id="editId">
            <input type="hidden" id="editCategoriaId">
            <div style="display:flex; flex-direction:column; gap:10px;">
                <div>
                    <label style="font-size:13px; color:#555; font-weight:600;">Nombre</label>
                    <input type="text" id="editNombre"
                           style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; margin-top:4px;">
                </div>
                <div>
                    <label style="font-size:13px; color:#555; font-weight:600;">Descripción</label>
                    <input type="text" id="editDescripcion"
                           style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; margin-top:4px;">
                </div>
                <div>
                    <label style="font-size:13px; color:#555; font-weight:600;">Precio</label>
                    <input type="text" id="editPrecio" inputmode="decimal"
                           style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; margin-top:4px;">
                </div>
                <div>
                    <label style="font-size:13px; color:#555; font-weight:600;">Stock</label>
                    <input type="number" id="editStock" min="0"
                           style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; margin-top:4px;">
                </div>
                <div>
                    <label style="font-size:13px; color:#555; font-weight:600;">URL de imagen</label>
                    <input type="text" id="editImagen"
                           style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; margin-top:4px;">
                </div>
            </div>
            <p id="mensajeEditar" style="min-height:18px; margin:12px 0; font-size:13px;"></p>
            <div style="display:flex; gap:10px;">
                <button onclick="guardarEdicion()"
                        style="flex:1; padding:10px; background:#088178; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:600;">
                    Guardar
                </button>
                <button onclick="cerrarModal()"
                        style="flex:1; padding:10px; background:#ccc; border:none; border-radius:5px; cursor:pointer; font-weight:600;">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="../script/admin.js"></script>
    <script src="../script/script.js"></script>

</body>
</html>
